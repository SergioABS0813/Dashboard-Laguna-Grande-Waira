<main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg ">
    <!-- Navbar -->
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
        <div class="container-fluid py-1 px-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
                    <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Páginas</a></li>
                    <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Ajustes</li>
                </ol>
            </nav>
        </div>
    </nav>
    <!-- End Navbar -->




    <div class="container-fluid py-2">
        <div class="row">
            <div class="col-12">
                <div class="card my-4">
                    <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                        <div class="bg-gradient-dark shadow-dark border-radius-lg pt-4 pb-3 position-relative">
                            <h6 class="text-white text-capitalize ps-3 d-inline-block">Ajustes</h6>
                        </div>

                    </div>
                    <div class="card-body px-0 pb-1">

                        <!-- Flash attribute de successMessage -->
                        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${successMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div class="px-4 py-2">

                            <form id="settingsForm" th:action="@{/settings/edit}" th:object="${userSettingsDto}" method="post">
                                <!-- Campo oculto para el ID -->
                                <input type="hidden" th:field="*{settings.id}">
                                <input type="hidden" th:field="*{user.id}">
                                <input type="hidden" th:field="*{user.email}">
                                <input type="hidden" th:field="*{user.password}">
                                <input type="hidden" th:field="*{user.role}">
                                <input type="hidden" th:field="*{user.active}">
                                <input type="hidden" th:field="*{user.phone}">
                                <input type="hidden" th:field="*{user.name}">
                                <input type="hidden" th:field="*{user.lastname}">
                                <input type="hidden" th:field="*{user.micronetworkList}">

                                <!-- Fila 1 -->
                                <div class="row">
                                    <!-- Key WeatherLink -->
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label">Key WeatherLink</label>
                                        <div class="input-group input-group-outline"
                                             th:classappend="${#fields.hasErrors('settings.keyWeatherLink')} ? ' is-invalid'">
                                            <input type="text" th:field="*{settings.keyWeatherLink}" class="form-control" />
                                        </div>
                                        <!-- Mensaje de error debajo -->
                                        <div th:if="${#fields.hasErrors('settings.keyWeatherLink')}" class="text-danger">
                                            <span class="material-symbols-rounded align-middle">error</span>
                                            <span th:errors="*{settings.keyWeatherLink}"></span>
                                        </div>
                                    </div>

                                    <!-- Key SparkMeter -->
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label">Key SparkMeter</label>
                                        <div class="input-group input-group-outline"
                                             th:classappend="${#fields.hasErrors('settings.keySparkMeter')} ? ' is-invalid'">
                                            <input type="text" th:field="*{settings.keySparkMeter}" class="form-control" />
                                        </div>
                                        <!-- Mensaje de error debajo -->
                                        <div th:if="${#fields.hasErrors('settings.keySparkMeter')}" class="text-danger">
                                            <span class="material-symbols-rounded align-middle">error</span>
                                            <span th:errors="*{settings.keySparkMeter}"></span>
                                        </div>
                                    </div>

                                    <!-- Token VRM -->
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label">Token VRM</label>
                                        <div class="input-group input-group-outline"
                                             th:classappend="${#fields.hasErrors('settings.tokenVRM')} ? ' is-invalid'">
                                            <input type="text" th:field="*{settings.tokenVRM}" class="form-control" />
                                        </div>
                                        <!-- Mensaje de error debajo -->
                                        <div th:if="${#fields.hasErrors('settings.tokenVRM')}" class="text-danger">
                                            <span class="material-symbols-rounded align-middle">error</span>
                                            <span th:errors="*{settings.tokenVRM}"></span>
                                        </div>
                                    </div>

                                </div>

                                <!-- Fila 2 -->
                                <div class="row">
                                    <!-- Secret WeatherLink -->
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label">Secret WeatherLink</label>
                                        <div class="input-group input-group-outline"
                                             th:classappend="${#fields.hasErrors('settings.secretWeatherLink')} ? ' is-invalid'">
                                            <input type="text" th:field="*{settings.secretWeatherLink}" class="form-control" />
                                        </div>
                                        <!-- Mensaje de error debajo -->
                                        <div th:if="${#fields.hasErrors('settings.secretWeatherLink')}" class="text-danger">
                                            <span class="material-symbols-rounded align-middle">error</span>
                                            <span th:errors="*{settings.secretWeatherLink}"></span>
                                        </div>
                                    </div>

                                    <!-- Secret SparkMeter -->
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label">Secret SparkMeter</label>
                                        <div class="input-group input-group-outline"
                                             th:classappend="${#fields.hasErrors('settings.secretSparkMeter')} ? ' is-invalid'">
                                            <input type="text" th:field="*{settings.secretSparkMeter}" class="form-control" />
                                        </div>
                                        <!-- Mensaje de error debajo -->
                                        <div th:if="${#fields.hasErrors('settings.secretSparkMeter')}" class="text-danger">
                                            <span class="material-symbols-rounded align-middle">error</span>
                                            <span th:errors="*{settings.secretSparkMeter}"></span>
                                        </div>
                                    </div>


                                </div>

                                <hr style="background-image: linear-gradient(0deg,transparent,rgba(1,1,2,.8),transparent)" class="horizontal my-3">

                                <!-- Fila 3 -->
                                <div class="row mt-2 p-2">

                                    <div class="col-md-4 align-content-center">
                                        <div class="input-group input-group-outline mb-3">
                                            <div class="form-check form-switch ps-0 is-filled">
                                                <input class="form-check-input ms-auto" type="checkbox" id="switchWhatsapp"
                                                       th:checked="${userSettingsDto.user.alertsWhatsapp}" th:field="*{user.alertsWhatsapp}">
                                                <label class="form-check-label text-body ms-3 mb-0" for="switchWhatsapp">
                                                    Enviar alertas a WhatsApp
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-md-4 align-content-center">
                                        <div class="input-group input-group-outline mb-3">
                                            <div class="form-check form-switch ps-0 is-filled">
                                                <input class="form-check-input ms-auto" type="checkbox" id="switchEmail"
                                                       th:checked="${userSettingsDto.user.alertsEmail}" th:field="*{user.alertsEmail}">
                                                <label class="form-check-label text-body ms-3 mb-0" for="switchEmail">
                                                    Enviar alertas por correo
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-md-4 align-content-center">
                                        <div class="input-group input-group-outline mb-3">
                                            <div class="form-check form-switch ps-0 is-filled">
                                                <input class="form-check-input ms-auto" type="checkbox" id="switchSMS"
                                                       th:checked="${userSettingsDto.user.alertsSMS}" th:field="*{user.alertsSMS}">
                                                <label class="form-check-label text-body ms-3 mb-0" for="switchSMS">
                                                    Enviar alertas por SMS
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                </div>

                                <!-- Botón para enviar -->
                                <div class="mt-2">
                                    <p class="text-sm" th:text="'Última Edición: ' + ${#dates.format(userSettingsDto.settings.timeEdition, 'dd/MM/yyyy HH:mm')}"></p>
                                </div>

                                <!-- Botón para enviar -->
                                <div class="text-center mt-1">
                                    <button type="submit" class="btn btn-primary">Guardar</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>


        <footer class="footer py-4  ">
            <div class="container-fluid">
                <div class="row align-items-center justify-content-lg-between">
                    <div class="col-lg-6 mb-lg-0 mb-4">
                        <div class="copyright text-center text-sm text-muted text-lg-start">
                            © <script> document.write(new Date().getFullYear()) </script>,
                            by
                            <a  class="font-weight-bold" target="_blank">GTR PUCP</a>
                            for Innovatel
                        </div>
                    </div>

                </div>
            </div>
        </footer>
    </div>
</main>

<script th:src="@{/js/core/popper.min.js}"></script>

<script>
    $(document).ready(function () {
        $('#users-table').DataTable({
            "paging": true,         // Habilita la paginación
            "searching": true,      // Habilita la barra de búsqueda
            "ordering": true,       // Habilita la ordenación por columnas
            "info": true,           // Muestra información sobre la tabla
            "lengthChange": true,   // Permite cambiar el número de registros mostrados
            "pageLength": 5,        // Número de registros mostrados por página
            "scrollResize": true,
            "scrollY": 540,
            "scrollCollapse": false,
            "language": {
                "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" // Traducción al español
            },
            "drawCallback": function (settings) {
                var api = this.api();
                var pageInfo = api.page.info();

                // Oculta la paginación si no es necesaria
                if (pageInfo.pages <= 1) {
                    $('.dataTables_paginate').hide();
                } else {
                    $('.dataTables_paginate').show();
                }
            }
        });
    });
</script>


<script>
    var win = navigator.platform.indexOf('Win') > -1;
    if (win && document.querySelector('#sidenav-scrollbar')) {
        var options = {
            damping: '0.5'
        }
        Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }
</script>

    <!-- START JS ALERTA -->

    <style>
        /* Asegura que el overlay de SweetAlert2 esté por encima de tu sidebar */
        .swal2-container {
            z-index: 999999 !important; /* número muy alto para sobrepasar el sidebar */
        }
        /* Opcional: oscurecer más el fondo al mostrar la alerta */
        .swal2-container.swal2-backdrop-show {
            background: rgba(0, 0, 0, 0.7) !important; /* más opaco que el default */
        }
    </style>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function() {
            const form = document.getElementById("settingsForm");

            form.addEventListener("submit", function(event) {
                // Detenemos el envío inmediato del formulario
                event.preventDefault();

                Swal.fire({
                    title: '¿Deseas aplicar los cambios?',
                    text: 'Confirmar si deseas guardar los datos ingresados.',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#3085d6',
                    cancelButtonColor: '#d33',
                    confirmButtonText: 'Sí, guardar',
                    cancelButtonText: 'Cancelar',
                    allowOutsideClick: false, // Bloquea clics fuera de la alerta
                    // backdrop: 'rgba(0,0,0,0.7)', // Alternativa para oscurecer (o usar CSS)
                }).then((result) => {
                    if (result.isConfirmed) {
                        // Si el usuario confirma, se envía el formulario
                        form.submit();
                    }
                });
            });
        });
    </script>

    <!-- END JS ALERTA -->

<!-- Control Center for Material Dashboard: parallax effects, scripts for the example pages etc -->
<script th:src="@{/js/core/material-dashboard.min.js}"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Start: Loader JS -->
    <script th:src="@{/js/plugins/loader.js}"></script>
    <!-- End: Loader JS -->

</body>
